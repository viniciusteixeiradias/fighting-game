<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left sword (blade points top-left) -->
  <polygon points="6,3 8,2 23,22 21,23" fill="#818CF8"/>
  <!-- Left sword guard -->
  <line x1="19" y1="20" x2="24" y2="23" stroke="#818CF8" stroke-width="2"/>
  <!-- Left sword handle -->
  <line x1="22" y1="23" x2="25" y2="27" stroke="#818CF8" stroke-width="2"/>

  <!-- Right sword (blade points top-right) -->
  <polygon points="26,3 24,2 9,22 11,23" fill="#818CF8"/>
  <!-- Right sword guard -->
  <line x1="13" y1="20" x2="8" y2="23" stroke="#818CF8" stroke-width="2"/>
  <!-- Right sword handle -->
  <line x1="10" y1="23" x2="7" y2="27" stroke="#818CF8" stroke-width="2"/>
</svg>
